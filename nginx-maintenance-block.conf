# Block all external access to admin/maintenance pages
# Add inside the your-domain.com server {} block in nginx config

# Maintenance, admin tools, and API pages — LAN only
location ~* ^/(bpq-maintenance|system-audit|firewall-status|log-viewer|partners-api|firewall-api|system-audit-api|log-viewer-api|admin)(\.|\.html|\.php|$) {
    allow 10.0.0.0/8;
    allow 192.168.0.0/16;
    allow 172.16.0.0/12;
    allow 127.0.0.1;
    deny all;
}
