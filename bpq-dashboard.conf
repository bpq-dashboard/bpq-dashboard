# =============================================================================
# dashboard.example.com + bpq.example.com
# =============================================================================

limit_req_zone $binary_remote_addr zone=dashboard_limit:10m    rate=10r/s;
limit_req_zone $binary_remote_addr zone=dashboard_api:10m      rate=5r/s;
limit_req_zone $binary_remote_addr zone=dashboard_logs:10m     rate=100r/s;
limit_req_zone $binary_remote_addr zone=dashboard_callsign:10m rate=10r/s;

geo $limit_external {
    default      1;
    10.0.0.0/8   0;
    127.0.0.1/32 0;
}
map $limit_external $dashboard_external_key {
    0  "";
    1  $binary_remote_addr;
}
limit_req_zone $dashboard_external_key zone=dashboard_external:10m rate=3r/s;

map $http_user_agent $is_bot {
    default           0;
    ""                1;
    ~*bot             1;
    ~*crawl           1;
    ~*spider          1;
    ~*slurp           1;
    ~*scraper         1;
    ~*harvest         1;
    ~*Googlebot       1;
    ~*Bingbot         1;
    ~*DuckDuckBot     1;
    ~*Baiduspider     1;
    ~*YandexBot       1;
    ~*Sogou           1;
    ~*Exabot          1;
    ~*facebot         1;
    ~*ia_archiver     1;
    ~*SemrushBot      1;
    ~*AhrefsBot       1;
    ~*MJ12bot         1;
    ~*DotBot          1;
    ~*BLEXBot         1;
    ~*PetalBot        1;
    ~*DataForSeoBot   1;
    ~*serpstatbot     1;
    ~*sqlmap          1;
    ~*nikto           1;
    ~*nmap            1;
    ~*masscan         1;
    ~*zgrab           1;
    ~*nuclei          1;
    ~*dirbuster       1;
    ~*gobuster        1;
    ~*wfuzz           1;
    ~*hydra           1;
    ~*burpsuite       1;
    ~*GPTBot          1;
    ~*ChatGPT-User    1;
    ~*CCBot           1;
    ~*anthropic-ai    1;
    ~*Claude-Web      1;
    ~*cohere-ai       1;
    ~*PerplexityBot   1;
    ~*python-requests 1;
    ~*python-urllib   1;
    ~*Go-http-client  1;
    ~*curl/           1;
    ~*wget/           1;
    ~*libwww-perl     1;
    ~*Java/           1;
    ~*PHP/            1;
    ~*Ruby            1;
    ~*axios           1;
    ~*okhttp          1;
}

# =============================================================================
# dashboard.example.com — BPQDASH Network Map
# =============================================================================
server {
    server_name dashboard.example.com;
    root /var/www/bpq-dashboard;

    if ($is_bot) { return 403; }

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag            "noindex, nofollow, noarchive, nosnippet" always;

    autoindex off;
    limit_req zone=dashboard_limit burst=20 nodelay;

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Redirect all BPQ Dashboard pages to bpq.example.com
    location = /bpq-rf-connections.html  { return 301 https://bpq.example.com; }
    location = /bpq-system-logs.html     { return 301 https://bpq.example.com/bpq-system-logs.html; }
    location = /bpq-traffic.html         { return 301 https://bpq.example.com/bpq-traffic.html; }
    location = /bpq-email-monitor.html   { return 301 https://bpq.example.com/bpq-email-monitor.html; }
    location = /bbs-messages.html        { return 301 https://bpq.example.com/bbs-messages.html; }
    location = /bpq-connect-log.html     { return 301 https://bpq.example.com/bpq-connect-log.html; }
    location = /nws-dashboard.html       { return 301 https://bpq.example.com/nws-dashboard.html; }
    location = /bpq-maintenance.html     { return 301 https://bpq.example.com/bpq-maintenance.html; }
    location = /bpq-telnet.html          { return 301 https://bpq.example.com/bpq-telnet.html; }
    # Admin-protected pages — redirect to bpq.example.com where the auth gate lives
    location = /hub-ops.html             { return 301 https://bpq.example.com/hub-ops.html; }
    location = /firewall-status.html     { return 301 https://bpq.example.com/firewall-status.html; }
    location = /log-viewer.html          { return 301 https://bpq.example.com/log-viewer.html; }
    location = /system-audit.html        { return 301 https://bpq.example.com/system-audit.html; }

    location = / {
    rewrite ^ /index-log.php last;
    }
    location / {
    index index.php index.html;
    try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* /(config|bbs-config|nws-config|bpqdash-config)\.php$ { return 403; }
    location ^~ /includes/ { return 403; }
    location ^~ /scripts/  { return 403; }
    location ^~ /data/     { return 403; }
    location ^~ /cache/    { return 403; }
    location ^~ /archives/ { return 403; }
    location ~ /\.          { deny all; }
    # ── BLOCK: Exploit scanner paths (phpunit RCE, vendor probes) ────────────
    location ~* /(vendor|phpunit|laravel|wordpress|wp-content|wp-admin|modules|simplesaml|concrete|administrator|joomla)/ { return 444; }
    location ~* eval-stdin\.php { return 444; }
    location ~* /(xmlrpc\.php|wp-login\.php|\.env|\.git/|composer\.(json|lock)|package\.json|\.DS_Store) { return 444; }
    location ~* \.(php\.example|bak|old|tmp|swp|orig|dist|md|sh|bat|yml|yaml)$ { return 403; }

    location ~* ^/logs/.*\.(txt|log|csv|vara|js)$ {
        limit_req zone=dashboard_logs burst=100 nodelay;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(pdf|vara)$ { expires 1h; try_files $uri =404; }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|map)$ {
        expires 1d;
        try_files $uri =404;
    }

    location = /callsign-lookup.php {
        limit_req zone=dashboard_callsign burst=80 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location = /network-api.php {
        limit_req zone=dashboard_external burst=20 nodelay;
        limit_req zone=dashboard_api     burst=20 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── bpq-telnet WebSocket proxy ────────────────────────────────────
    location ^~ /ws/telnet {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        allow 73.20.230.239;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
    }

    location ~ \.php$ {
        limit_req zone=dashboard_api burst=10 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/dashboard.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = dashboard.example.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name dashboard.example.com;
    return 404;
}

# =============================================================================
# bpq.example.com — BPQ Dashboard
# =============================================================================
server {
    server_name bpq.example.com;
    root /var/www/bpq-dashboard;

    if ($is_bot) { return 403; }

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag            "noindex, nofollow, noarchive, nosnippet" always;

    autoindex off;
    limit_req zone=dashboard_limit burst=20 nodelay;

    # Root serves BPQ RF Connections — explicitly, no index fallback

    location = / {
    rewrite ^ /rf-log.php last;
    }
    location = /bpq-rf-connections.html {
    rewrite ^ /rf-log.php last;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # ── BPQ Management Interface — double auth, internet accessible ───────────
    # Layer 1: nginx Basic Auth — browser password prompt (first gate)
    # Layer 2: BPQ's own sysop password — handled by BPQ on Terminal/EditCfg
    # Setup:   sudo apt install apache2-utils
    #          sudo htpasswd -c /etc/nginx/.bpq-mgmt-auth SYSOPUSER
    # Access:  https://bpq.example.com/bpq-mgmt/Node/Stats.html
    location ^~ /bpq-mgmt/ {
        auth_basic           "YOURCALL BPQ Management";
        auth_basic_user_file /etc/nginx/.bpq-mgmt-auth;

        rewrite ^/bpq-mgmt/(.*) /$1 break;
        proxy_pass             http://127.0.0.1:8008;
        proxy_set_header       Host 127.0.0.1:8008;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_http_version     1.1;
        proxy_pass_request_headers on;
        proxy_redirect         http://127.0.0.1:8008/ /bpq-mgmt/;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;
        proxy_connect_timeout  10s;
        access_log /var/log/nginx/bpq-mgmt-access.log;
    }

    # ── Admin Dashboard Pages — same htpasswd as bpq-mgmt ─────────────────────
    # These pages expose system internals (firewall state, raw logs, audit
    # data, hub config). Protected by HTTP Basic Auth using the same
    # credential file as /bpq-mgmt/. To add/change users:
    #   sudo apt install apache2-utils    # if not already installed
    #   sudo htpasswd /etc/nginx/.bpq-mgmt-auth SYSOPUSER       # set/change pw
    #   sudo htpasswd -c /etc/nginx/.bpq-mgmt-auth SYSOPUSER    # FIRST TIME ONLY
    # Browser will prompt once per session, then remember credentials for
    # all 5 admin URLs.
    location = /hub-ops.html {
        auth_basic           "YOURCALL Admin";
        auth_basic_user_file /etc/nginx/.bpq-mgmt-auth;
        try_files $uri =404;
    }
    location = /bpq-maintenance.html {
        auth_basic           "YOURCALL Admin";
        auth_basic_user_file /etc/nginx/.bpq-mgmt-auth;
        try_files $uri =404;
    }
    location = /firewall-status.html {
        auth_basic           "YOURCALL Admin";
        auth_basic_user_file /etc/nginx/.bpq-mgmt-auth;
        try_files $uri =404;
    }
    location = /log-viewer.html {
        auth_basic           "YOURCALL Admin";
        auth_basic_user_file /etc/nginx/.bpq-mgmt-auth;
        try_files $uri =404;
    }
    location = /system-audit.html {
        auth_basic           "YOURCALL Admin";
        auth_basic_user_file /etc/nginx/.bpq-mgmt-auth;
        try_files $uri =404;
    }

    location ^~ /bpqdash-network/ { return 403; }
    location ~* /(config|bbs-config|nws-config|bpqdash-config)\.php$ { return 403; }
    location ^~ /includes/ { return 403; }
    location ^~ /scripts/  { return 403; }
    location ^~ /data/     { return 403; }
    location ^~ /cache/    { return 403; }
    location ^~ /archives/ { return 403; }
    location ~ /\.          { deny all; }
    # ── BLOCK: Exploit scanner paths (phpunit RCE, vendor probes) ────────────
    location ~* /(vendor|phpunit|laravel|wordpress|wp-content|wp-admin|modules|simplesaml|concrete|administrator|joomla)/ { return 444; }
    location ~* eval-stdin\.php { return 444; }
    location ~* /(xmlrpc\.php|wp-login\.php|\.env|\.git/|composer\.(json|lock)|package\.json|\.DS_Store) { return 444; }
    location ~* \.(php\.example|bak|old|tmp|swp|orig|dist|md|sh|bat|yml|yaml)$ { return 403; }

    location ~* ^/logs/.*\.(txt|log|csv|vara|js)$ {
        limit_req zone=dashboard_logs burst=100 nodelay;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(pdf|vara)$ { expires 1h; try_files $uri =404; }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|map)$ {
        expires 1d;
        try_files $uri =404;
    }

    location = /callsign-lookup.php {
        limit_req zone=dashboard_callsign burst=80 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location = /network-api.php {
        limit_req zone=dashboard_external burst=20 nodelay;
        limit_req zone=dashboard_api     burst=20 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── bpq-chat.php — extended timeout for telnet operations ──────────
    location = /bpq-chat.php {
        limit_req zone=dashboard_api burst=5 nodelay;
        fastcgi_read_timeout 90s;
        fastcgi_send_timeout 90s;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── bpq-aprs.php — extended timeout for APRS-IS connection ─────────
    location = /bpq-aprs.php {
        limit_req zone=dashboard_api burst=5 nodelay;
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── bpq-nodes-api.php — live NetROM nodes/routes via BPQ telnet ────
    location = /bpq-nodes-api.php {
        limit_req zone=dashboard_api burst=5 nodelay;
        fastcgi_read_timeout 30s;
        fastcgi_send_timeout 30s;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── bpq-telnet WebSocket proxy ────────────────────────────────────
    # Note: target host allowlist enforced in bpq-telnet-daemon.py
    # ^~ prefix ensures this takes priority over location / catch-all
    location ^~ /ws/telnet {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Allow authenticated users — daemon enforces target allowlist
        allow 73.20.230.239;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
    }

    # ── vara-api.php — VARA HF terminal API ──────────────────────────
    location = /vara-api.php {
        limit_req zone=dashboard_api burst=10 nodelay;
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── wavenode-api.php — RF Power Monitor JSON API ──────────────
    location = /wavenode-api.php {
        limit_req zone=dashboard_api burst=10 nodelay;
        fastcgi_read_timeout 10s;
        fastcgi_send_timeout 10s;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── bpq-vara.html — VARA HF terminal page ────────────────────────
    location = /bpq-vara.html {
        try_files $uri =404;
    }

    # ── bpq-vara WebSocket proxy ──────────────────────────────────────
    # Page-level auth handled by bpq-vara.html login overlay
    # ^~ prefix ensures priority over location / catch-all
    location ^~ /ws/vara {
        proxy_pass         http://127.0.0.1:8767;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        allow 73.20.230.239;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;
    }

    location ~ \.php$ {
        limit_req zone=dashboard_api burst=10 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location / {
        try_files $uri =404;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/bpq.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bpq.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = bpq.example.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name bpq.example.com;
    return 404;
}
