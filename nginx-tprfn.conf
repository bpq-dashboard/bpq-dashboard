# =============================================================================
# tprfn.k1ajd.net — Nginx Server Block with Security Hardening
# Root: /var/www/tprfn
# PHP: 8.3 via unix socket
# Covers: TPRFN Network Monitor, BPQ Dashboard, PDF/VARA file serving
# =============================================================================
#
# INSTALLATION:
#   Replace your existing tprfn.k1ajd.net server block with this one.
#   Then: sudo nginx -t && sudo systemctl reload nginx
#
# =============================================================================

# ── Rate limiting zones (defined outside server block) ───────────────────────
# Standard zone for general requests
limit_req_zone $binary_remote_addr zone=tprfn_limit:10m rate=10r/s;

# Stricter zone for PHP API endpoints
limit_req_zone $binary_remote_addr zone=tprfn_api:10m rate=5r/s;

# High-rate zone for log file serving (dashboard fetches many files in parallel)
limit_req_zone $binary_remote_addr zone=tprfn_logs:10m rate=100r/s;

server {
    server_name tprfn.k1ajd.net;
    root /var/www/tprfn;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Disable directory listing ────────────────────────────────────────────
    autoindex off;

    # ── Default: index files ─────────────────────────────────────────────────
    location / {
        index index.php index.html;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── BLOCK: Config files (CRITICAL) ───────────────────────────────────────
    location ~* /(config|bbs-config|nws-config|tprfn-config)\.php$ {
        return 403;
    }

    # ── BLOCK: Protected directories ─────────────────────────────────────────
    location ^~ /includes/ {
        return 403;
    }
    location ^~ /scripts/ {
        return 403;
    }
    location ^~ /data/ {
        return 403;
    }
    location ^~ /cache/ {
        return 403;
    }
    location ^~ /archives/ {
        return 403;
    }

    # ── BLOCK: Hidden files (.ht, .git, .env, etc.) ─────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── BLOCK: Backup, example, and source files ─────────────────────────────
    location ~* \.(php\.example|bak|old|tmp|swp|orig|dist|md|sh|bat|yml|yaml)$ {
        return 403;
    }

    # ── ALLOW: logs/ directory (txt/log/csv/vara/js, no PHP, no listing) ───────
    # Serve permitted log file types — regex ~* beats plain prefix /logs/ for matching URIs
    location ~* ^/logs/.*\.(txt|log|csv|vara|js)$ {
        limit_req zone=tprfn_logs burst=100 nodelay;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Block everything else under /logs/ (PHP, directory listings, other types)
    # Plain prefix (no ^~) so regex locations above are still evaluated first
    location /logs/ {
        autoindex off;
        return 403;
    }

    # ── ALLOW: PDF and VARA downloads ────────────────────────────────────────
    location ~* \.(pdf|vara)$ {
        expires 1h;
        try_files $uri =404;
    }

    # ── ALLOW: Static assets ─────────────────────────────────────────────────
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|map)$ {
        expires 1d;
        try_files $uri =404;
    }

    # ── PHP: Pass to PHP-FPM 8.3 ────────────────────────────────────────────
    location ~ \.php$ {
        # Don't execute PHP files that don't exist
        try_files $uri =404;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── SSL (managed by Certbot) ─────────────────────────────────────────────
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/tprfn.k1ajd.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tprfn.k1ajd.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ── HTTP → HTTPS redirect (managed by Certbot) ──────────────────────────────
server {
    if ($host = tprfn.k1ajd.net) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name tprfn.k1ajd.net;
    return 404;
}
