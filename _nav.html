<!--
  _nav.html — Shared navigation partial for BPQ Dashboard
  
  Loaded via fetch() by every page. Pages tag themselves with
  <body data-nav-page="rf"> so the active link gets highlighted.
  
  Structure:
    Desktop:  brand | clocks | [13 daily links] [Admin ▾ dropdown]
    Mobile:   brand | clocks | hamburger
              ↓ tap hamburger
              [13 daily links] [── Admin section header ──] [5 admin links]
  
  See bpq-nav-loader.js for fetch + inject + active-link + dropdown logic.
-->
<style>
.bpq-nav {
    background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    border-bottom: 1px solid rgba(139, 92, 246, 0.3);
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    margin-bottom: 1rem;
    position: sticky;
    top: 0;
    z-index: 50;
}
.bpq-nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0.75rem 1rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
}
.bpq-nav-brand {
    font-size: 1.125rem;
    font-weight: 700;
    background: linear-gradient(90deg, #a78bfa 0%, #60a5fa 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    flex-shrink: 0;
    text-decoration: none;
}
.bpq-nav-clocks {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
    font-size: 0.75rem;
    flex-shrink: 0;
}
.bpq-nav-clock-utc {
    padding: 0.3rem 0.6rem;
    border-radius: 0.375rem;
    background: linear-gradient(90deg, #7c3aed 0%, #2563eb 100%);
    color: #ffffff;
    font-weight: 700;
    letter-spacing: 0.05em;
}
.bpq-nav-clock-local {
    padding: 0.3rem 0.6rem;
    border-radius: 0.375rem;
    background: #374151;
    color: #d1d5db;
    font-weight: 600;
}
.bpq-nav-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
    align-items: center;
}
.bpq-nav-link {
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    color: #d1d5db;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.85rem;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
}
.bpq-nav-link:hover {
    background: rgba(139, 92, 246, 0.15);
    color: #ffffff;
}
.bpq-nav-link.active {
    background: rgba(139, 92, 246, 0.25);
    color: #ffffff;
    border: 1px solid rgba(139, 92, 246, 0.4);
}

/* Admin dropdown — desktop: hover or click. Mobile: inline section. */
.bpq-nav-admin {
    position: relative;
}
.bpq-nav-admin-btn {
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    color: #d1d5db;
    background: transparent;
    border: none;
    cursor: pointer;
    font-weight: 500;
    font-size: 0.85rem;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
}
.bpq-nav-admin-btn:hover {
    background: rgba(139, 92, 246, 0.15);
    color: #ffffff;
}
.bpq-nav-admin-btn.active {
    background: rgba(139, 92, 246, 0.25);
    color: #ffffff;
    border: 1px solid rgba(139, 92, 246, 0.4);
    padding: calc(0.5rem - 1px) calc(0.75rem - 1px);  /* Account for border */
}
.bpq-nav-admin-caret {
    font-size: 0.6rem;
    margin-left: 0.1rem;
    transition: transform 0.15s;
}
.bpq-nav-admin.open .bpq-nav-admin-caret {
    transform: rotate(180deg);
}
.bpq-nav-admin-menu {
    display: none;
    position: absolute;
    top: calc(100% + 0.25rem);
    right: 0;
    min-width: 180px;
    background: #1f2937;
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 0.5rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    padding: 0.25rem;
    z-index: 60;
}
.bpq-nav-admin.open .bpq-nav-admin-menu {
    display: block;
    animation: bpq-nav-slide 0.15s ease-out;
}
.bpq-nav-admin-menu .bpq-nav-link {
    display: block;
    padding: 0.6rem 0.75rem;
    border-radius: 0.375rem;
}

.bpq-nav-hamburger {
    display: none;
    width: 44px;
    height: 44px;
    align-items: center;
    justify-content: center;
    border-radius: 0.5rem;
    background: rgba(139, 92, 246, 0.15);
    color: #d1d5db;
    border: 1px solid rgba(139, 92, 246, 0.3);
    cursor: pointer;
    font-size: 1.5rem;
    line-height: 1;
    padding: 0;
}
.bpq-nav-hamburger:hover {
    background: rgba(139, 92, 246, 0.25);
    color: #ffffff;
}

/* Section divider for admin items in mobile drawer (desktop hides this) */
.bpq-nav-section {
    display: none;
}

@media (max-width: 767px) {
    .bpq-nav-hamburger {
        display: flex;
    }
    .bpq-nav-links {
        display: none;
        flex-direction: column;
        align-items: stretch;
        width: 100%;
        margin-top: 0.5rem;
        gap: 0.25rem;
        padding-top: 0.5rem;
        border-top: 1px solid rgba(139, 92, 246, 0.2);
    }
    .bpq-nav-links.open {
        display: flex;
        animation: bpq-nav-slide 0.2s ease-out;
    }
    .bpq-nav-link {
        padding: 0.75rem 1rem;
        font-size: 1rem;
        border-radius: 0.5rem;
    }
    .bpq-nav-clocks {
        order: 1;
        font-size: 0.7rem;
    }
    .bpq-nav-clock-utc, .bpq-nav-clock-local {
        padding: 0.25rem 0.5rem;
    }
    /* On mobile, the desktop dropdown becomes flat: hide the button,
       show admin items inline under a section divider */
    .bpq-nav-admin {
        display: contents;   /* let children flow into parent flex */
    }
    .bpq-nav-admin-btn {
        display: none;
    }
    .bpq-nav-admin-menu {
        display: contents;
        position: static;
        box-shadow: none;
        background: none;
        border: none;
        padding: 0;
    }
    .bpq-nav-admin-menu .bpq-nav-link {
        padding: 0.75rem 1rem;
        font-size: 1rem;
        border-radius: 0.5rem;
    }
    .bpq-nav-section {
        display: block;
        padding: 0.5rem 0.5rem 0.25rem;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #9ca3af;
        border-top: 1px solid rgba(139, 92, 246, 0.15);
        margin-top: 0.5rem;
    }
}

@keyframes bpq-nav-slide {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>

<nav class="bpq-nav">
    <div class="bpq-nav-inner">
        <a href="bpq-rf-connections.html" class="bpq-nav-brand">📡 BPQ Dashboard</a>
        <div class="bpq-nav-clocks">
            <span id="navUtcClock"   class="bpq-nav-clock-utc"   title="UTC / Zulu">--:--:-- Z</span>
            <span id="navLocalClock" class="bpq-nav-clock-local" title="Local time">--:--:-- L</span>
        </div>
        <button id="bpqNavHamburger" class="bpq-nav-hamburger" type="button"
                aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
        <div id="bpqNavLinks" class="bpq-nav-links">
            <!-- Daily-use links (13 entries) -->
            <a href="bpq-rf-connections.html"  class="bpq-nav-link" data-page="rf">RF</a>
            <a href="bpq-traffic.html"          class="bpq-nav-link" data-page="traffic">Traffic</a>
            <a href="bpq-system-logs.html"      class="bpq-nav-link" data-page="system">System</a>
            <a href="bpq-connect-log.html"      class="bpq-nav-link" data-page="connects">Connects</a>
            <a href="bpq-email-monitor.html"    class="bpq-nav-link" data-page="messages">Messages</a>
            <a href="bbs-messages.html"         class="bpq-nav-link" data-page="bbs">BBS</a>
            <a href="nws-dashboard.html"        class="bpq-nav-link" data-page="weather">Weather</a>
            <a href="bpq-chat.html"             class="bpq-nav-link" data-page="chat">Chat</a>
            <a href="bpq-aprs.html"             class="bpq-nav-link" data-page="aprs">APRS</a>
            <a href="bpq-vara.html"             class="bpq-nav-link" data-page="vara">VARA</a>
            <a href="bpq-telnet.html"           class="bpq-nav-link" data-page="telnet">Telnet</a>
            <a href="rig-status.html"           class="bpq-nav-link" data-page="rig">Rig</a>
            <a href="rf-power-monitor.html"     class="bpq-nav-link" data-page="rf-power">RF Power</a>

            <!-- Admin dropdown (5 entries grouped behind a desktop dropdown) -->
            <div class="bpq-nav-section">Admin</div>
            <div id="bpqNavAdmin" class="bpq-nav-admin">
                <button id="bpqNavAdminBtn" class="bpq-nav-admin-btn" type="button"
                        aria-haspopup="true" aria-expanded="false">
                    Admin <span class="bpq-nav-admin-caret">▼</span>
                </button>
                <div class="bpq-nav-admin-menu">
                    <a href="hub-ops.html"          class="bpq-nav-link" data-page="hub">Hub Ops</a>
                    <a href="bpq-maintenance.html"  class="bpq-nav-link" data-page="maint">Maintenance</a>
                    <a href="firewall-status.html"  class="bpq-nav-link" data-page="firewall">Firewall</a>
                    <a href="log-viewer.html"       class="bpq-nav-link" data-page="logs">Logs</a>
                    <a href="system-audit.html"     class="bpq-nav-link" data-page="audit">Audit</a>
                </div>
            </div>
        </div>
    </div>
</nav>
