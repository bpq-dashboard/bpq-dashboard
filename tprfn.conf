# =============================================================================
# tprfn.k1ajd.net + bpq.k1ajd.net
# =============================================================================

limit_req_zone $binary_remote_addr zone=tprfn_limit:10m    rate=10r/s;
limit_req_zone $binary_remote_addr zone=tprfn_api:10m      rate=5r/s;
limit_req_zone $binary_remote_addr zone=tprfn_logs:10m     rate=100r/s;
limit_req_zone $binary_remote_addr zone=tprfn_callsign:10m rate=10r/s;

geo $limit_external {
    default      1;
    10.0.0.0/8   0;
    127.0.0.1/32 0;
}
map $limit_external $tprfn_external_key {
    0  "";
    1  $binary_remote_addr;
}
limit_req_zone $tprfn_external_key zone=tprfn_external:10m rate=3r/s;

map $http_user_agent $is_bot {
    default           0;
    ""                1;
    ~*bot             1;
    ~*crawl           1;
    ~*spider          1;
    ~*slurp           1;
    ~*scraper         1;
    ~*harvest         1;
    ~*Googlebot       1;
    ~*Bingbot         1;
    ~*DuckDuckBot     1;
    ~*Baiduspider     1;
    ~*YandexBot       1;
    ~*Sogou           1;
    ~*Exabot          1;
    ~*facebot         1;
    ~*ia_archiver     1;
    ~*SemrushBot      1;
    ~*AhrefsBot       1;
    ~*MJ12bot         1;
    ~*DotBot          1;
    ~*BLEXBot         1;
    ~*PetalBot        1;
    ~*DataForSeoBot   1;
    ~*serpstatbot     1;
    ~*sqlmap          1;
    ~*nikto           1;
    ~*nmap            1;
    ~*masscan         1;
    ~*zgrab           1;
    ~*nuclei          1;
    ~*dirbuster       1;
    ~*gobuster        1;
    ~*wfuzz           1;
    ~*hydra           1;
    ~*burpsuite       1;
    ~*GPTBot          1;
    ~*ChatGPT-User    1;
    ~*CCBot           1;
    ~*anthropic-ai    1;
    ~*Claude-Web      1;
    ~*cohere-ai       1;
    ~*PerplexityBot   1;
    ~*python-requests 1;
    ~*python-urllib   1;
    ~*Go-http-client  1;
    ~*curl/           1;
    ~*wget/           1;
    ~*libwww-perl     1;
    ~*Java/           1;
    ~*PHP/            1;
    ~*Ruby            1;
    ~*axios           1;
    ~*okhttp          1;
}

# =============================================================================
# tprfn.k1ajd.net — TPRFN Network Map
# =============================================================================
server {
    server_name tprfn.k1ajd.net;
    root /var/www/tprfn;

    if ($is_bot) { return 403; }

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag            "noindex, nofollow, noarchive, nosnippet" always;

    autoindex off;
    limit_req zone=tprfn_limit burst=20 nodelay;

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Redirect all BPQ Dashboard pages to bpq.k1ajd.net
    location = /bpq-rf-connections.html  { return 301 https://bpq.k1ajd.net; }
    location = /bpq-system-logs.html     { return 301 https://bpq.k1ajd.net/bpq-system-logs.html; }
    location = /bpq-traffic.html         { return 301 https://bpq.k1ajd.net/bpq-traffic.html; }
    location = /bpq-email-monitor.html   { return 301 https://bpq.k1ajd.net/bpq-email-monitor.html; }
    location = /bbs-messages.html        { return 301 https://bpq.k1ajd.net/bbs-messages.html; }
    location = /bpq-connect-log.html     { return 301 https://bpq.k1ajd.net/bpq-connect-log.html; }
    location = /nws-dashboard.html       { return 301 https://bpq.k1ajd.net/nws-dashboard.html; }
    location = /bpq-maintenance.html     { return 301 https://bpq.k1ajd.net/bpq-maintenance.html; }

    location = / {
    rewrite ^ /tprfn-index-log.php last;
    }
    location / {
    index index.php index.html;
    try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* /(config|bbs-config|nws-config|tprfn-config)\.php$ { return 403; }
    location ^~ /includes/ { return 403; }
    location ^~ /scripts/  { return 403; }
    location ^~ /data/     { return 403; }
    location ^~ /cache/    { return 403; }
    location ^~ /archives/ { return 403; }
    location ~ /\.          { deny all; }
    location ~* \.(php\.example|bak|old|tmp|swp|orig|dist|md|sh|bat|yml|yaml)$ { return 403; }

    location ~* ^/logs/.*\.(txt|log|csv|vara|js)$ {
        limit_req zone=tprfn_logs burst=100 nodelay;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(pdf|vara)$ { expires 1h; try_files $uri =404; }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|map)$ {
        expires 1d;
        try_files $uri =404;
    }

    location = /callsign-lookup.php {
        limit_req zone=tprfn_callsign burst=80 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location = /network-api.php {
        limit_req zone=tprfn_external burst=20 nodelay;
        limit_req zone=tprfn_api     burst=20 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ \.php$ {
        limit_req zone=tprfn_api burst=10 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/tprfn.k1ajd.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tprfn.k1ajd.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = tprfn.k1ajd.net) { return 301 https://$host$request_uri; }
    listen 80;
    server_name tprfn.k1ajd.net;
    return 404;
}

# =============================================================================
# bpq.k1ajd.net — BPQ Dashboard
# =============================================================================
server {
    server_name bpq.k1ajd.net;
    root /var/www/tprfn;

    if ($is_bot) { return 403; }

    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag            "noindex, nofollow, noarchive, nosnippet" always;

    autoindex off;
    limit_req zone=tprfn_limit burst=20 nodelay;

    # Root serves BPQ RF Connections — explicitly, no index fallback

    location = / {
    rewrite ^ /tprfn-rf-log.php last;
    }
    location = /bpq-rf-connections.html {
    rewrite ^ /tprfn-rf-log.php last;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location ^~ /tprfn-network/ { return 403; }
    location ~* /(config|bbs-config|nws-config|tprfn-config)\.php$ { return 403; }
    location ^~ /includes/ { return 403; }
    location ^~ /scripts/  { return 403; }
    location ^~ /data/     { return 403; }
    location ^~ /cache/    { return 403; }
    location ^~ /archives/ { return 403; }
    location ~ /\.          { deny all; }
    location ~* \.(php\.example|bak|old|tmp|swp|orig|dist|md|sh|bat|yml|yaml)$ { return 403; }

    location ~* ^/logs/.*\.(txt|log|csv|vara|js)$ {
        limit_req zone=tprfn_logs burst=100 nodelay;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(pdf|vara)$ { expires 1h; try_files $uri =404; }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|map)$ {
        expires 1d;
        try_files $uri =404;
    }

    location = /callsign-lookup.php {
        limit_req zone=tprfn_callsign burst=80 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location = /network-api.php {
        limit_req zone=tprfn_external burst=20 nodelay;
        limit_req zone=tprfn_api     burst=20 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── bpq-chat.php — extended timeout for telnet operations ──────────
    location = /bpq-chat.php {
        limit_req zone=tprfn_api burst=5 nodelay;
        fastcgi_read_timeout 90s;
        fastcgi_send_timeout 90s;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # ── bpq-aprs.php — extended timeout for APRS-IS connection ─────────
    location = /bpq-aprs.php {
        limit_req zone=tprfn_api burst=5 nodelay;
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ \.php$ {
        limit_req zone=tprfn_api burst=10 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location / {
        try_files $uri =404;
    }

    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/bpq.k1ajd.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bpq.k1ajd.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = bpq.k1ajd.net) { return 301 https://$host$request_uri; }
    listen 80;
    server_name bpq.k1ajd.net;
    return 404;
}
